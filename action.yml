name: Build
description: Composite GitHub Action to build a brdgm.me application.

inputs:
  sonar-token:
    description: SONAR_TOKEN secret. This is not available for external PRs, so it may be empty and Sonar is skipped in this case.
    required: false
  github-token:
    description: GITHUB_TOKEN secret
    required: true

runs:
  using: composite

  steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

    - name: Read properties from package.json
      id: package_json
      uses: zoexx/github-action-json-file-properties@42c424cc2a0f9dfd36c79aedb70d429c0ae3e3fa # 1.0.7
      with:
        file_path: package.json

    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: lts/*
        cache: npm

    - run: npm ci
      shell: bash

    - run: npm run lint
      shell: bash

    - run: npm run test:coverage
      shell: bash

    - run: npm run build
      shell: bash

    - uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8
      if: inputs.sonar-token != ''
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        SONAR_TOKEN: ${{ inputs.sonar-token }}
      with:
        args: -Dsonar.projectVersion=${{steps.package_json.outputs.version}}
